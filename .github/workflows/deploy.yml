name: Build and Deploy

on:
  push:
    branches:
      - master

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/users-app

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build image
        run: |
          docker build -t users-app .

      - name: Push image
        run: |
          docker tag users-app $IMAGE_NAME:latest
          docker tag users-app $IMAGE_NAME:${{ github.sha }}

          docker push $IMAGE_NAME:latest
          docker push $IMAGE_NAME:${{ github.sha }}

  deploy:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: kubsu.tyvik.ru
          port: 58529
          username: hurd
          key: ${{ secrets.SSH_PRIVATE_KEY }}

          script: |
            podman login ghcr.io -u ${{ github.actor }} -p ${{ secrets.GITHUB_TOKEN }}

            podman pull ${{ env.IMAGE_NAME }}:latest

            podman stop users-api || true
            podman rm users-api || true

            podman run -d \
              --name users-api \
              --network host \
              -e DATABASE_URL=postgresql+psycopg://kubsu:kubsu@127.0.0.1:5432/kubsu \
              ${{ env.IMAGE_NAME }}:latest
